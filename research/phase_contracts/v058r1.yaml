fold_and_sequence_contract:
  train_symbols_source: exact_v32_asset_folds_train_symbols
  validation_symbols_source: exact_same_fold_train_symbols
  train_triplets_source: exact_v32_triplet_catalog_train_triplets
  validation_triplets_source: exact_same_fold_train_triplets
  test_symbols_or_triplets_allowed_in_scaler_train_or_validation: false
  asset_order: lexical_ascending
  feature_order:
    - log_open_to_open_return
    - log_close_to_close_return
    - log_high_low_range
    - log_close_open_return
    - log1p_quote_volume_change
    - log1p_trade_count_change
    - rolling_realized_volatility_7d
    - rolling_realized_volatility_30d
    - within_triplet_relative_strength
  time_order: utc_daily_ascending
  sequence_start: exact_registered_sequence_start_date
  sequence_end: signal_date_inclusive
  required_calendar_rows: 256
  skipping_missing_dates_or_tail_selection_allowed: false
  missing_value_imputation_or_repair_allowed: false
  eligible_pair: all_three_symbols_have_exact_role_and_complete_h1_h3_h7_labels

scaler_contract:
  count: 12
  identity: origin_geometry_fold_shared_across_three_seeds
  fit_role: train_only
  fit_symbols: exact_fold_train_symbols
  fit_population: unique_finite_train_symbol_signal_date_cells_within_exact_train_signal_range
  duplicate_context_weighting_allowed: false
  base_feature_row_rule: all_eight_base_features_finite
  statistics_dtype: float64
  mean: arithmetic_population_mean_per_base_feature
  standard_deviation: population_ddof_zero_per_base_feature
  nonfinite_statistic_action: fail
  exactly_zero_standard_deviation_replacement: 1.0
  validation_or_evaluation_fit_allowed: false
  application_dtype: float32
  relative_feature:
    formula: raw_asset_log_close_to_close_return_minus_raw_equal_weight_triplet_mean
    scale: same_cell_log_close_to_close_return_population_standard_deviation
    subtract_base_feature_mean: false
  target:
    source_dtype: float64
    tensor_dtype: float32
    scaling: none
    clipping: false
    nonfinite_active_value_action: fail
  required_receipt_fields:
    - origin
    - geometry
    - fold
    - fit_symbol_count
    - fit_unique_symbol_date_count
    - fit_min_date
    - fit_max_date
    - mean
    - standard_deviation
    - zero_scale_replacements
    - scaler_sha256

model_and_objective_contract:
  architecture_source: exact_v55_blueprint
  architecture_canonical_sha256: 0c91c65ed422d081ba1ce59544c3911cbd4624a0f4c184cc24d6c02dfc41d435
  parameter_count: 465513
  input_shape: [null, 256, 3, 9]
  input_dtype: float32
  output_shape: [null, 3, 3, 3]
  initialization: fresh_per_registered_job_seed
  prior_checkpoint_or_representation_reuse: false
  loss_implementation: raw_multi_horizon_quantile_loss_from_v56
  loss_weights: {pinball: 1.0, ranking: 0.5, crossing: 0.1}
  ranknet_horizon_quantile: h7_q50
  ranknet_tie_tolerance: 1.0e-12
  quantile_crossing_reduction: mean_batch_asset_horizon_of_sum_adjacent_relu
  target_scaling: none
  target_clipping: false
  outcome_weighting: false

sampling_contract:
  unit: exact_lexical_triplet_on_eligible_signal_date
  candidate_order: date_then_lexical_triplet_ascending
  distribution: uniform_over_flattened_eligible_date_triplet_pairs
  replacement: true
  generator: numpy_default_rng_pcg64
  train_seed_derivation: >-
    first_eight_big_endian_bytes_of_sha256_canonical_json_array
    [20260714,"v58",origin,geometry,fold,job_seed,"train",epoch]
  validation_seed_derivation: >-
    first_eight_big_endian_bytes_of_sha256_canonical_json_array
    [20260714,"v58",origin,geometry,fold,20260714,"validation",0]
  validation_is_identical_across_job_seeds: true
  validation_epoch: 0
  train_samples_per_epoch: 8192
  fixed_validation_samples: 2048
  batch_size: 128
  sample_receipt: canonical_ordered_draw_list_sha256

grid_contract:
  origins: [origin_2024, origin_2025]
  geometries: [expanding, rolling]
  folds: [1, 2, 3]
