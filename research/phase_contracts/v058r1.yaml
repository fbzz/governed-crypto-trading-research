        validation_signal_range: ['2024-01-01', '2024-12-23']

optimizer_and_early_stopping_contract:
  optimizer: AdamW
  learning_rate: 0.0003
  betas: [0.9, 0.999]
  epsilon: 1.0e-8
  weight_decay: 0.0001
  amsgrad: false
  foreach: false
  fused: false
  capturable: false
  maximize: false
  differentiable: false
  scheduler: none
  gradient_clip_norm: 1.0
  gradient_clip_norm_type: 2.0
  gradient_clip_error_if_nonfinite: true
  maximum_epochs: 30
  validation_mode: model_eval_no_grad_after_every_completed_epoch
  validation_total_loss_aggregation: global_component_sums_divided_by_exact_cell_or_pair_counts
  early_stopping_monitor: validation_total_loss
  early_stopping_minimum_delta: 0.0
  strict_improvement: current_loss_strictly_less_than_best_loss
  equal_loss_is_non_improvement: true
  early_stopping_patience: 5
  stop_when_consecutive_non_improvements_greater_than_or_equal_to_patience: true
  restore_state: strictly_best_validation_model
  best_epoch_tie_policy: earliest_strict_best
  evaluation_load_key: best_model_state

runtime_contract:
  device: mps
  dtype: float32
  amp: false
  cpu_fallback_allowed: false
  pytorch_enable_mps_fallback: '0'
  deterministic_algorithms: true
  torch_threads: 1
  dataloader_workers: 0
  maximum_active_optimizer_jobs: 1
  process_lock: data/checkpoints/.v58_state_conditioned_multi_horizon_training.lock
  process_lock_scope: smoke_full_verify_and_replay
