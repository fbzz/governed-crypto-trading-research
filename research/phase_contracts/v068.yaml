  operation_order: [doctor, smoke, full, verify, replay]
  preflight_precedes_smoke: true
  training_spec_and_phase_contract_hash_required_before_smoke: true

commands:
  doctor: PYTHONPATH=src python3 -m tlm research-doctor
  preflight: >-
    PYTHONPATH=src python3 -m tlm v64-r2-probabilistic-state-gate-training-preflight
    --config configs/v68_v64_r2_probabilistic_state_gate_training.yaml
  smoke: >-
    PYTORCH_ENABLE_MPS_FALLBACK=0 PYTHONPATH=src python3 -m tlm
    v64-r2-probabilistic-state-gate-training-smoke
    --config configs/v68_v64_r2_probabilistic_state_gate_training.yaml
  full: >-
    PYTORCH_ENABLE_MPS_FALLBACK=0 PYTHONPATH=src python3 -m tlm
    v64-r2-probabilistic-state-gate-training
    --config configs/v68_v64_r2_probabilistic_state_gate_training.yaml
  verify: >-
    PYTHONPATH=src python3 -m tlm v64-r2-probabilistic-state-gate-training-verify
    --config configs/v68_v64_r2_probabilistic_state_gate_training.yaml
  replay: >-
    PYTORCH_ENABLE_MPS_FALLBACK=0 PYTHONPATH=src python3 -m tlm
