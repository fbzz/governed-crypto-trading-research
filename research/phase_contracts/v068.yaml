  old_gate_substates_loaded_into_model: []
  old_gate_substates_inspected_selected_or_reused: []
  predictions_written: false
  policy_actions_emitted: false
  performance_metrics_computed: false
  pnl_computed: false
  hyperparameters_changed: false

operator_enforcement_contract:
  expected_job_grid_source: reconstruct_from_grid_optimizer_and_runtime_contract
  authorized_operations: [doctor, smoke, full, verify, replay]
  live_doctor_fields_must_match_packet:
    - free_disk_bytes
    - required_free_disk_bytes
    - mps_available
    - deterministic_algorithms
    - fallback_enabled
