gate_model_and_objective_contract:
  architecture:
    input_features: 18
    lookback_days: 256
    patch_length_days: 16
    patch_stride_days: 8
    d_model: 32
    encoder_layers: 2
    attention_heads: 4
    feed_forward_width: 64
    dropout: 0.2
    outputs: [normalized_triplet_market_location, normalized_triplet_market_raw_scale]
    expected_parameter_count: 27522
  distribution: student_t_location_scale
  degrees_of_freedom: 5.0
  degrees_of_freedom_trainable: false
  scale_transform: softplus_plus_floor
  scale_floor: 0.0001
  target: train_only_triplet_mean_next_open_log_return
  loss: mean_negative_student_t_log_likelihood
  early_stopping_monitor: gate_internal_validation_negative_student_t_log_likelihood
  ranker_uncertainty_added: false

grid_optimizer_and_runtime_contract:
  folds: [1, 2, 3]
  seeds: [42, 7, 123]
  expected_jobs: 9
  all_jobs_retained_without_selection: true
  device: mps
  dtype: float32
  deterministic_algorithms: true
  mps_fallback_allowed: false
  optimizer:
    name: AdamW
    learning_rate: 0.0003
    betas: [0.9, 0.999]
    epsilon: 1.0e-8
    weight_decay: 0.0001
  batch_size: 128
  train_samples_per_epoch: 8192
  fixed_validation_samples: 2048
  maximum_epochs: 30
  early_stopping_patience: 5
  gradient_clip_norm: 1.0
  hyperparameter_search_allowed: false
  seed_fold_or_epoch_selection_allowed: false

