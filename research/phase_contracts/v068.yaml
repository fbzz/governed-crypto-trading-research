    - phase_contract_sha256
    - source_bundle_sha256
    - job_context

smoke_contract:
  fold: 1
  seed: 42
  train_samples_per_epoch: 128
  fixed_validation_samples: 128
  batch_size: 32
  maximum_epochs: 2
  early_stopping_patience: 2
  interrupt_after_completed_epoch: 1
  equivalence_requirements:
    - exact_ranker_state
    - probabilistic_gate_state
    - gate_optimizer_state
    - cpu_rng_state
    - mps_rng_state
    - sampler_receipts
    - early_stopping_state
    - full_history
    - optimizer_step_count

artifact_contract:
  packet_files:
