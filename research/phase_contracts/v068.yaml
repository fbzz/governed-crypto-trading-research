    - scaler_manifest.json
    - smoke.json
    - source_receipt.json
    - training_result.json
    - training_spec.json
    - verification.json
    - smoke_data_access.json
  training_spec: exact_canonical_projection_of_this_phase_contract
  source_receipt_requires_clean_git_head: true
  checkpoint_manifest_requires_all_nine_file_semantic_ranker_and_gate_hashes: true
