    - rolling_realized_volatility_7d
    - rolling_realized_volatility_30d
    - target_realized_volatility_7d
  label_projection:
    - date
    - symbol
    - target_h1_maturity_date
    - target_h1_open_to_open_log_return
    - h1_label_complete
  sequence_projection:
    - date
    - sequence_start_date
    - symbol
    - h1_label_complete
    - eligible_train
    - eligible_consumed_development_validation
  row_filters_per_job:
    symbols: exact_fold_train_symbols_only
    pretraining_train_features: exact_eligible_train_sequence_contexts
    pretraining_validation_features: exact_consumed_development_validation_sequence_contexts
    supervised_train_labels: exact_eligible_train_signal_keys_with_finite_h1_and_finite_realized_volatility_target
    supervised_validation_labels: exact_consumed_development_validation_signal_keys_with_finite_h1_and_finite_realized_volatility_target
    pretraining_feature_only_rows_do_not_require_supervised_targets: true
    feature_context: exact_union_of_registered_256_day_context_keys
    heldout_fold_symbols: forbidden_in_scaler_pretraining_training_and_validation
    maximum_signal_date: '2025-12-23'
  forbidden_column_patterns:
    - in_one_shot_non_target_confirmation
    - target_asset
    - portfolio
    - pnl

fold_sequence_and_scaler_contract:
  train_symbols_source: exact_v32_asset_folds_train_symbols
  validation_symbols_source: exact_same_fold_train_symbols
  train_triplets_source: exact_v32_triplet_catalog_train_triplets
  validation_triplets_source: exact_same_fold_train_triplets
  asset_order: lexical_ascending
  feature_order:
    - log_open_to_open_return
    - log_close_to_close_return
    - log_high_low_range
    - log_close_open_return
    - log1p_quote_volume_change
    - log1p_trade_count_change
    - rolling_realized_volatility_7d
    - rolling_realized_volatility_30d
    - within_triplet_relative_strength
  state_feature_order:
    - cross_asset_mean_of_nine_scaled_inputs
    - cross_asset_population_std_of_nine_scaled_inputs
  required_calendar_rows: 256
  missing_value_imputation_or_repair_allowed: false
  eligible_pair: all_three_symbols_have_exact_role_complete_h1_and_finite_features
  base_feature_scalers:
    count: 3
    identity: fold_shared_across_three_seeds_and_both_modules
    fit_role: eligible_train_only
    fit_symbols: exact_fold_train_symbols
    population: unique_finite_train_symbol_date_cells_without_context_duplication
    statistics_dtype: float64
    standard_deviation: population_ddof_zero
    zero_standard_deviation_replacement: 1.0
    application_dtype: float32
  relative_feature_scaling:
    subtract_mean: false
    divisor: same_fold_train_std_of_log_close_to_close_return
  ranker_excess_target_scale:
    fit_role: exact_train_triplet_pairs_only
    statistic: population_root_mean_square_of_centered_excess
    minimum_value: 1.0e-6
    validation_fit_allowed: false
  state_market_target_scale:
    fit_role: exact_train_triplet_pairs_only
    statistic: population_root_mean_square_of_triplet_market_component
    minimum_value: 1.0e-6
    validation_fit_allowed: false

model_and_objective_contract:
  input_shape: [null, 256, 3, 9]
  input_dtype: float32
  ranker:
    parameter_count: 1231634
    output_shape: [null, 3, 2]
    architecture_source: exact_v60_blueprint
    pretraining:
      scope: ranker_patch_encoder_only
      mask_fraction: 0.15
      loss: smooth_l1_beta_1_masked_patches_only
      train_samples_per_epoch: 8192
      fixed_validation_samples: 2048
      batch_size: 128
      maximum_epochs: 50
      early_stopping_patience: 5
    supervised_loss:
      ranking: ranknet_non_tied_pairs_weight_1
      centered_excess: smooth_l1_train_scaled_excess_beta_1_weight_1
      log_volatility_7d: smooth_l1_log_clamped_realized_volatility_beta_1_weight_0_1
      early_stopping_monitor: ranking_plus_centered_excess_without_volatility
      target_clipping: false
      outcome_weighting: false
  state_gate:
    parameter_count: 27489
    output_shape: [null, 1]
    architecture_source: exact_v60_blueprint
    loss: smooth_l1_normalized_triplet_market_component_beta_1
    early_stopping_monitor: state_gate_validation_loss
    ranker_representation_input: none
  total_parameter_count: 1259123
  parameter_ceiling: 1300000
  shared_parameters: false
  combined_scalar_loss: false
  ranker_gradients_enter_gate: false
  gate_gradients_enter_ranker: false

grid_optimizer_and_runtime_contract:
  folds: [1, 2, 3]
  seeds: [42, 7, 123]
  expected_jobs: 9
  job_key_order: fold_seed
  selected_or_discarded_jobs_allowed: false
  train_role: eligible_train
  validation_role: eligible_consumed_development_validation
  train_signal_range: ['2021-03-01', '2024-12-23']
  validation_signal_range: ['2025-01-01', '2025-12-23']
  ranker_and_gate_optimizers_independent: true
  optimizer:
    name: AdamW
    learning_rate: 0.0003
    betas: [0.9, 0.999]
    epsilon: 1.0e-8
    weight_decay: 0.0001
    scheduler: none
  supervised_training:
    train_samples_per_epoch: 8192
    fixed_validation_samples: 2048
    batch_size: 128
    maximum_epochs: 30
    early_stopping_patience: 5
    early_stopping_minimum_delta: 0.0
    strict_improvement: true
    restore_best_state: true
    gradient_clip_norm: 1.0
  sampling:
    unit: exact_lexical_triplet_on_eligible_signal_date
    candidate_order: date_then_lexical_triplet_ascending
    distribution: uniform_over_flattened_eligible_date_triplet_pairs
    replacement: true
    generator: numpy_default_rng_pcg64
    validation_is_fixed_across_epochs: true
  runtime:
    device: mps
    dtype: float32
    amp: false
    deterministic_algorithms: true
    pytorch_mps_fallback: disabled
    torch_threads: 10
  initialization: fresh_registered_seed_with_in_phase_ranker_pretraining
  prior_family_checkpoint_or_representation_reuse: false
  resume: same_job_exact_phase_and_completed_epoch_boundary_only
  checkpoint_retention: all_nine_final_jobs_without_selection

