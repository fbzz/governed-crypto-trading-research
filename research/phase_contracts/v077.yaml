  internal_validation_role: eligible_internal_validation
  internal_validation_is_clean_evidence: false
  maximum_signal_date: '2024-12-23'
  maximum_feature_context_date: '2024-12-31'
  any_2025_or_later_value_allowed: false
  read_strategy: predicate_and_column_projection_per_fold_before_materialization
  full_table_materialization_then_filter_allowed: false
  train_symbols: exact_v32_fold_train_symbols
  heldout_fold_symbols: forbidden
  triplets: exact_v32_fold_train_triplets_in_lexical_order
  missing_data: preserve_without_imputation

feature_and_scaler_contract:
  model_feature_order:
    - log_open_to_open_return
    - log_close_to_close_return
    - log_high_low_range
    - log_close_open_return
    - log1p_quote_volume_change
    - log1p_trade_count_change
    - rolling_realized_volatility_7d
    - rolling_realized_volatility_30d
    - within_triplet_relative_strength
  relative_strength_source: log_close_to_close_return
  relative_strength_formula: asset_value_minus_equal_weight_triplet_mean_same_date
  scaler_count: 3
  one_scaler_per_fold: true
  shared_across_three_seeds_within_fold: true
  fit_role: eligible_train_only
  fit_symbols: exact_v32_fold_train_symbols
  heldout_fold_asset_access: forbidden
  statistics_dtype: float64
  application_dtype: float32
  zero_scale_replacement: 1.0

model_and_objective_contract:
  architecture:
    input_shape: [null, 256, 3, 9]
    d_model: 128
    patch_length_days: 16
    patch_stride_days: 8
    patch_count: 31
    temporal_encoder_layers: 4
    cross_asset_attention_layers: 1
    attention_heads: 8
    feed_forward_width: 512
    dropout: 0.15
    activation: gelu
    norm_first: true
    shared_causal_asset_encoder: true
    asset_slot_embedding: false
    maximum_duration_days: 7
    expected_parameter_count: 1083155
  return_distribution: student_t_location_scale
  student_t_degrees_of_freedom: 5.0
  student_t_degrees_of_freedom_trainable: false
  scale_transform: softplus_plus_floor
  scale_floor: 0.0001
  output_horizons: [1, 3, 7]
  return_loss: mean_negative_log_likelihood_over_active_asset_horizon_cells
  pairwise_ranking_loss: ranknet_non_tied_asset_pairs_at_each_horizon
  duration_loss: discrete_time_event_negative_log_likelihood_with_right_censoring
  objective_weights:
    return_nll: 1.0
    pairwise_ranking: 0.25
    duration_nll: 0.5
  early_stopping_monitor: weighted_validation_joint_objective
  target_clipping: false
  pnl_turnover_or_outcome_weighting: false

grid_optimizer_and_runtime_contract:
  folds: [1, 2, 3]
  seeds: [42, 7, 123]
  expected_jobs: 9
  all_jobs_retained_without_selection: true
  initialization: fresh_registered_seed
  prior_checkpoint_reuse: none
  device: mps
  dtype: float32
  deterministic_algorithms: true
  mps_fallback_allowed: false
  optimizer:
    name: AdamW
    learning_rate: 0.0003
    betas: [0.9, 0.999]
    epsilon: 1.0e-8
    weight_decay: 0.0001
  batch_size: 128
  train_samples_per_epoch: 8192
  fixed_validation_samples: 2048
  maximum_epochs: 40
  early_stopping_patience: 6
  early_stopping_minimum_delta: 1.0e-6
  gradient_clip_norm: 1.0
  hyperparameter_search_allowed: false
  seed_fold_or_epoch_selection_allowed: false

