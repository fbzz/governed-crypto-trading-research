evaluation_contract:
  role: retrospective_non_target_first_use_in_tlm_not_prospective_confirmation
  clean_holdout_claim: false
  prospective_confirmation_claim: false
  target_transfer_claim: false
  window:
    feature_lookback_start: '2025-08-26'
    signal_start: '2026-01-01'
    signal_end: '2026-06-08'
    signal_dates: 159
    first_execution_open: '2026-01-02'
    final_outcome_maturity: '2026-06-30'
  folds: [1, 2, 3]
  seeds: [42, 7, 123]
  seed_aggregation: ordered_float64_arithmetic_mean_42_7_123_without_selection
  triplet_scope: exact_120_lexical_combinations_of_each_folds_ten_heldout_assets
  fold_portfolio_aggregation: equal_weight_120_exact_triplet_subaccounts_without_selection
  cross_fold_aggregation: equal_one_third_capital_per_fold_daily_mean
  inference:
    device: mps
    dtype: float32
    mps_fallback_allowed: false
    batch_size: 128
    model_mode: eval
    gradient_enabled: false
    checkpoints: every_registered_fold_seed_checkpoint
    checkpoint_state: model_best_state_at_registered_early_stopping_best_epoch
  feature_projection:
    - date
    - symbol
    - log_open_to_open_return
    - log_close_to_close_return
    - log_high_low_range
    - log_close_open_return
    - log1p_quote_volume_change
    - log1p_trade_count_change
    - rolling_realized_volatility_7d
    - rolling_realized_volatility_30d
    - sequence_start_date
    - sequence_ready
  forbidden_prepare_columns:
    - raw_open
    - open_to_next_open_log_return
    - outcome_complete
    - target_21d_open_to_open_log_return
  prediction_projection:
    - fold
    - triplet_id
    - signal_date
    - symbol
    - seed
    - centered_score
    - eligible
  outcome_projection_forbidden_during_prepare: true
  realized_return_or_pnl_columns_in_prepare_outputs: false

policy_contract:
  source: exact_v80_blueprint_policy_with_v82_r0_chronology
  action_space: [long_one_asset, cash]
  decision_clock: first_eligible_signal_then_every_21_eligible_signal_dates
  decision_interval_eligible_dates: 21
  market_gate: triplet_mean_trailing_63_calendar_day_log_close_to_close_return_strictly_positive
  entry: market_gate_true_and_lexical_first_top_centered_score_strictly_positive
  switch_margin: 0.25
  tie_break: incumbent_first_cash_second_lexical_asset
  transition_turnover: {enter: 1.0, exit: 1.0, hold: 0.0, switch: 2.0}
  final_liquidation: true
  missing_signal_action: carry_incumbent_without_advancing_eligible_decision_clock
  maximum_evaluation_decisions: 8
  structural_maximum_turnover: 16.0
  risky_gross: 1.0
  reporting_cost_bps: [10, 20, 30]
  shorting: false
  leverage: false
  policy_tuning_allowed: false
  threshold_sweep_allowed: false

registered_accounting:
  return_basis: daily_open_to_next_open_log_returns
  gross_return: sum_weight_times_expm1_action_log_return
  turnover: l1_weight_change_including_entry_switch_exit_and_final_liquidation
  transaction_cost: one_way_cost_times_turnover
  net_return: gross_minus_turnover_cost
  missing_return: cash_for_unavailable_asset
  fold: equal_weight_120_triplet_subaccounts_daily_mean
  aggregate: equal_one_third_capital_per_fold_daily_mean
  annualization_days: 365
  sharpe_standard_deviation_ddof: 1
  zero_volatility_sharpe: 0.0
  maximum_drawdown: minimum_equity_divided_by_prior_running_peak_minus_one

registered_controls:
  cash:
    rule: all_zero_weights
  decision_21d_equal_weight_three_assets:
    decision_clock: same_candidate_eligible_clock
    market_gate: same_63_calendar_day_triplet_gate
    action: equal_one_third_each_triplet_asset_when_gate_true_else_cash
    hold: carry_between_decision_dates
    final_liquidation: true
  decision_21d_top_trailing_21d_momentum_with_same_63d_market_gate:
    decision_clock: same_candidate_eligible_clock
    signal: trailing_21_consecutive_calendar_day_sum_log_close_to_close_return_including_signal_date
    market_gate: same_63_calendar_day_triplet_gate
    action: long_lexical_first_highest_strictly_positive_asset_else_cash
    hold: carry_between_decision_dates
    final_liquidation: true

registered_bootstrap:
  method: circular_block_resampling_synchronized_across_candidate_and_controls
  paths: 10000
  block_lengths_days: [7, 21, 42]
  base_seed: 20260716
  confidence_level: 0.90
  economic_cost_bps: 10
  candidate_statistic: compounded_aggregate_net_total_return
  comparison_statistic: candidate_minus_best_control_compounded_total_return

registered_outcome_dependent_gates:
  aggregate_net_total_return_strictly_positive_at_cost_bps: [10, 20, 30]
  every_fold_net_total_return_strictly_positive_at_cost_bps: [10]
  aggregate_net_total_return_strictly_above_every_control_at_cost_bps: [10]
  aggregate_sharpe_strictly_positive_at_cost_bps: [10]
  aggregate_maximum_drawdown_at_10_bps_at_least: -0.20
  aggregate_turnover_at_most: 16.0
  exposure_fraction_between: [0.05, 0.95]
  bootstrap_candidate_total_return_p10_strictly_positive_all_block_lengths: true
  bootstrap_candidate_minus_best_control_p10_strictly_positive_all_block_lengths: true
  aggregate_rescue_for_failed_fold: false
  missing_cell_pass_allowed: false

