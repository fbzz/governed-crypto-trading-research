label_contract:
  return_order: [h1, h3, h7]
  cumulative_return_definitions:
    h1: log(open[t+2] / open[t+1])
    h3: log(open[t+4] / open[t+1])
    h7: log(open[t+8] / open[t+1])
  duration_support_days: [1, 2, 3, 4, 5, 6, 7]
  duration_definition: earliest_argmax_day_of_cumulative_gross_open_to_open_log_return_days_1_through_7
  duration_tie_break: earliest_day
  duration_right_censor_rule: censored_when_earliest_argmax_is_day_7
  maximum_label_maturity_days: 8
  purge_days: 8
  embargo_days: 8
  joint_eligibility: source_sequence_ready_and_all_return_and_duration_endpoints_finite
  target_clipping: false
  missing_policy: preserve_rows_and_masks_without_imputation

