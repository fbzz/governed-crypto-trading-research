label_contract:
  order: [h1, h3, h7]
  dtype: float64
  definitions:
    h1:
      column: target_h1_open_to_open_log_return
      formula: log(open[t+2] / open[t+1])
      maturity_offset_days: 2
    h3:
      column: target_h3_open_to_open_log_return
      formula: log(open[t+4] / open[t+1])
      maturity_offset_days: 4
    h7:
      column: target_h7_open_to_open_log_return
      formula: log(open[t+8] / open[t+1])
      maturity_offset_days: 8
  endpoint_semantics: only_open_t_plus_1_and_open_t_plus_h_plus_1_must_be_finite
  joint_eligibility: all_three_labels_finite_and_source_sequence_ready
  partial_horizon_training_allowed: false
  missing_policy:
    imputation: forbidden
    label_rows: preserve_all_60210_panel_keys_with_nan_when_an_endpoint_is_missing
    sequence_rows: preserve_all_49919_source_sequence_keys
    ineligible_rows: retain_with_false_eligibility_flags

