data_contract:
  source_panel: data/processed/selected_universe_panel_v32.parquet
  source_sequence_index: data/processed/selected_universe_sequence_index_v32.parquet
  calendar: ['2021-01-01', '2026-06-30']
  symbol_count: 30
  input_layout: [batch, time, assets, features]
  input_shape: [null, 256, 3, 9]
  input_dtype: float32
  missing_data: preserve_without_imputation
  action_return:
    column: target_h1_open_to_open_log_return
    formula: log(open[t+2] / open[t+1])
    maturity_offset_days: 2
  derived_triplet_targets:
    market_component: equal_weight_mean_of_three_asset_action_returns
    centered_excess: asset_action_return_minus_triplet_market_component
    centered_excess_sum: exact_zero_within_triplet
    materialization: derive_on_demand_inside_exact_lexical_triplet
  derived_state_features:
    order: [cross_asset_mean_of_nine_inputs, cross_asset_population_std_of_nine_inputs]
    count: 18
    materialization: derive_on_demand_inside_exact_lexical_triplet

