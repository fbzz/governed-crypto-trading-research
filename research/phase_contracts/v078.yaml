policy_contract:
  source: exact_v74_blueprint_policy
  action_space: [long_one_asset, cash]
  base_cost_bps: 10
  reporting_cost_bps: [10, 20, 30]
  risky_gross: 1.0
  horizons: [1, 3, 7]
  horizon_weights: [0.2, 0.3, 0.5]
  persistent_edge: weighted_survival_times_per_day_gross_location
  state_transition: incumbent_first_cash_second_lexical_asset
  transition_turnover: {enter: 1.0, exit: 1.0, hold: 0.0, switch: 2.0}
  final_liquidation: true
  unavailable_triplet_action: force_cash_with_exact_exit_turnover_and_no_capital_redistribution
  shorting: false
  leverage: false
  policy_tuning_allowed: false
  threshold_sweep_allowed: false

registered_accounting:
  return_basis: open_to_open_log_returns
  gross_return: sum_weight_times_expm1_action_log_return
  turnover: l1_weight_change_including_entry_switch_exit_and_final_liquidation
  transaction_cost: one_way_cost_times_turnover
  net_return: gross_minus_turnover_cost
  missing_return: cash_for_unavailable_asset
  fold: equal_weight_120_triplet_subaccounts_daily_mean
  aggregate: equal_one_third_capital_per_fold_daily_mean
  annualization_days: 365
  sharpe_standard_deviation_ddof: 1
  zero_volatility_sharpe: 0.0
  maximum_drawdown: minimum_equity_divided_by_prior_running_peak_minus_one

registered_controls:
  cash:
    rule: all_zero_weights
  weekly_dual_momentum_30_long_one_or_cash:
    decision_clock: first_eligible_triplet_date_then_every_seven_eligible_triplet_dates
    signal: trailing_30_consecutive_calendar_day_sum_log_close_to_close_return_including_signal_date
    action: long_lexical_first_highest_strictly_positive_asset_else_cash
    holding: carry_between_decision_dates
    final_liquidation: true
  daily_equal_weight_eligible_assets:
    action: equal_one_third_each_available_triplet_asset_else_cash
    final_liquidation: true

registered_bootstrap:
  method: circular_block_resampling_synchronized_across_candidate_and_controls
  paths: 10000
  block_lengths_days: [7, 21, 63]
  base_seed: 20260715
  confidence_level: 0.95
  economic_cost_bps: 10
  candidate_statistic: compounded_aggregate_net_total_return
  comparison_statistic: candidate_minus_best_control_compounded_total_return

registered_outcome_dependent_gates:
  aggregate_maximum_drawdown_at_10_bps_at_least: -0.35
  aggregate_net_total_return_strictly_positive_at_cost_bps: [10, 20, 30]
  aggregate_net_total_return_strictly_above_every_control_at_cost_bps: [10]
  aggregate_sharpe_strictly_positive_at_cost_bps: [10]
  aggregate_turnover_at_10_bps_at_most: 45.0
  every_fold_net_total_return_strictly_positive_at_cost_bps: [10]
  bootstrap_candidate_total_return_p05_strictly_positive_all_block_lengths: true
  bootstrap_candidate_minus_best_control_total_return_p05_strictly_positive_all_block_lengths: true
  aggregate_rescue_for_failed_fold: false
  missing_cell_pass_allowed: false

outcome_blind_gate_contract:
  gates:
    - all_registered_checkpoints_used_without_selection
    - exact_fold_triplet_date_scope
    - missingness_matches_registered_readiness
    - prediction_distribution_finite_and_nonconstant
    - positive_scale_and_valid_survival
    - ensemble_disagreement_finite
    - permutation_and_lexical_structure_complete
    - action_space_and_state_transitions_exact
    - turnover_and_final_liquidation_exact
    - control_positions_exact
    - aggregate_turnover_within_registered_ceiling
    - zero_outcome_and_target_access
  all_required: true
  failure_keeps_outcomes_sealed: true

