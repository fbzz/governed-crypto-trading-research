evaluation_contract:
  role: consumed_adaptive_development_only
  clean_holdout_claim: false
  prospective_confirmation_claim: false
  target_transfer_claim: false
  window:
    signal_start: '2025-01-01'
    signal_end: '2025-12-23'
    label: open_t_plus_1_to_open_t_plus_2_log_return
  fold_scope:
    inference_assets: exact_v32_test_symbols_for_same_fold
    forbidden_assets: exact_v32_train_symbols_for_same_fold
    seeds: [42, 7, 123]
    context_triplets: exact_v32_test_triplets_for_same_fold
    seed_aggregation: arithmetic_mean_without_selection
    context_aggregation: arithmetic_mean_without_selection
  outcome_blind_prepare:
    feature_and_readiness_columns_only_before_freeze: true
    label_or_outcome_columns_before_freeze: false
    freeze_ranker_excess_state_market_absolute_edge_and_positions: true
    content_addressed_prepare_manifest_required: true
  one_shot_outcome_open:
    exact_registered_packet_only: true
    maximum_open_count: 1
    regeneration_or_retuning_after_open: false
  predictive_diagnostics:
    - aggregate_and_fold_spearman_rank_correlation
    - aggregate_and_fold_pairwise_accuracy
    - aggregate_and_fold_top_one_centered_excess
    - state_market_component_error_and_direction
    - absolute_return_error_and_direction
  policy:
    source: exact_v60_blueprint_policy
    action_space: [long_one_asset, cash]
    costs_bps: [10, 20, 30]
    switch_hurdle: 0.002
    final_liquidation: true
    shorting: false
    leverage: false
  economic_diagnostics:
    - aggregate_and_fold_total_return
    - aggregate_and_fold_sharpe
    - aggregate_and_fold_maximum_drawdown
    - turnover_and_transition_counts
    - asset_month_and_holding_episode_attribution
  decision_semantics:
    v64_can_establish_deployability: false
    v64_can_authorize_target_assets: false
    v64_can_override_prior_family_retirements: false
    favorable_result_may_only_support_future_prospective_non_target_specification: true
  registered_prepare_spec:
    config_path: configs/v64_decoupled_rank_state_evaluation.yaml
    config_file_sha256: 72eadff4f884cd773405138c6a66e5656ddceb6fa007e2f61a23e3e32710b5c8
    implementation: tlm.decoupled_rank_state_evaluation.prepare_decoupled_rank_state_evaluation
    signal_dates: 357
    folds: [1, 2, 3]
    seeds: [42, 7, 123]
    heldout_symbols_per_fold: 10
    lookback_days: 256
    feature_projection:
      - date
      - symbol
      - log_open_to_open_return
      - log_close_to_close_return
      - log_high_low_range
      - log_close_open_return
      - log1p_quote_volume_change
      - log1p_trade_count_change
      - rolling_realized_volatility_7d
      - rolling_realized_volatility_30d
    readiness_projection:
      - date
      - sequence_start_date
      - symbol
      - h1_label_complete
      - eligible_consumed_development_validation
    outcome_projection_forbidden_during_prepare: true
    checkpoint_aggregation: arithmetic_mean_all_three_seeds_without_selection
    triplet_aggregation: arithmetic_mean_all_exact_eligible_contexts
    market_aggregation: arithmetic_mean_all_seed_context_predictions_per_fold_date
    momentum_30: rolling_sum_log_close_to_close_return_30_days_including_signal_date
    positions_are_cost_specific: true
  registered_accounting:
    gross_return: sum_weight_times_expm1_action_log_return
    turnover: l1_weight_change_including_entry_switch_exit_and_final_liquidation
    net_return: gross_minus_turnover_cost
    aggregate: equal_one_third_capital_per_fold_daily_mean
    annualization_days: 365
    sharpe_standard_deviation_ddof: 1
    zero_volatility_sharpe: 0.0
  registered_controls:
    cash: all_zero_weights
  registered_bootstrap:
    method: circular_block
    paths: 10000
    block_lengths_days: [7, 21, 63]
    base_seed: 20260715
    batch_size: 250
    top1_statistic: arithmetic_mean_centered_action_excess
    economic_cost_bps: 10
    economic_statistic: compounded_aggregate_net_return
  registered_outcome_dependent_gates:
    mean_spearman_strictly_positive_each_fold: true
    mean_top1_centered_excess_strictly_positive_each_fold: true
    aggregate_pairwise_accuracy_strictly_above: 0.50
    aggregate_state_direction_accuracy_strictly_above: 0.50
    aggregate_absolute_direction_accuracy_strictly_above: 0.50
    positive_net_return_each_fold_at_10bps: true
    aggregate_net_return_strictly_positive_all_costs: true
    aggregate_sharpe_strictly_positive_all_costs: true
    maximum_absolute_drawdown: 0.35
    top1_bootstrap_p05_strictly_positive_all_blocks: true
    economic_bootstrap_p05_strictly_positive_all_blocks: true
    all_cells_required: true
    failure_action: retire_family_without_target_evaluation_or_retuning
    pass_action: authorize_future_prospective_non_target_specification_only
  registered_outcome_blind_gates:
    - all_registered_checkpoints_used_without_selection
    - exact_fold_asset_and_triplet_scope
    - missingness_matches_registered_readiness
    - prediction_distribution_finite_and_nonconstant
    - ensemble_disagreement_finite
    - action_coverage_complete
    - turnover_accounting_complete
    - concentration_at_most_one_asset
    - exposure_bounded_zero_to_one
    - episode_and_churn_structure_complete
    - quantile_crossing_not_applicable
    - zero_outcome_and_target_access
  one_shot_lifecycle:
    generic_continue_is_not_unseal_authorization: true
    explicit_user_authorization_after_prepare_required: true
    maximum_unseal_count: 1
    prepare_replay_is_hash_only: true
    regeneration_after_unseal: false
    exact_outcome_source_read_count: 1
    interrupted_unseal_without_atomic_packet: fail_closed

