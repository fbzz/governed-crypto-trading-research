      risky_gross: 1.0
      controls:
        - cash
        - decision_21d_equal_weight_three_assets
        - decision_21d_top_trailing_21d_momentum_with_same_63d_market_gate
      accounting: exact_l1_entry_switch_exit_forced_exit_and_final_liquidation
      aggregate: equal_weight_120_triplet_subaccounts_then_equal_one_third_folds
      bootstrap:
        paths: 10000
        block_lengths_days: [7, 21, 42]
        seed: 20260716
        confidence_level: 0.90
      mandatory_gates:
