      authentication_required: false
      source_endpoint_contract: public_rest_klines_then_archive_checksum_reconciliation
      candle_timezone: UTC
      interval: 1d
      feature_cutoff: fully_closed_daily_candle_only
      capture_not_before_utc: '00:05:00'
      prediction_freeze_deadline: before_target_h1_maturity_open
      missing_or_late_source_action: omit_signal_date_without_imputation_and_extend_clock
      source_revision_action: preserve_original_packet_and_fail_integrity_gate
    timestamp_contract:
      feature_date: UTC_date_of_last_fully_closed_feature_candle
      eligible_action_date: feature_date_plus_1_calendar_day
      target_h1_maturity_date: feature_date_plus_2_calendar_days
      realized_return: log_open_at_maturity_divided_by_open_at_eligible_action
