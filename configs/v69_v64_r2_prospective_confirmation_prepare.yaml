      minimum_eligible_signal_dates_per_fold: 90
      minimum_fully_matured_signal_dates_per_fold: 90
      minimum_active_position_days_per_fold: 20
      maximum_calendar_days: 365
      close_rule: close_only_when_every_minimum_is_met_or_maximum_calendar_days_expires
      expiry_action: retire_as_inconclusive_without_retuning
    prediction_freeze:
      cadence: one_immutable_packet_per_eligible_signal_date
      required_receipts:
        - source_input_hash_receipt
        - checkpoint_manifest_reference_receipt
        - prediction_packet_sha256
        - position_packet_sha256
        - policy_state_before_and_after_sha256
        - freeze_timestamp_utc
        - target_maturity_timestamp_utc
      freeze_must_precede_target_maturity: true
      regeneration_after_freeze_allowed: false
      checkpoint_selection_allowed: false
      interim_metric_or_pnl_access: false
    policy:
      abstention_probability_threshold: 0.60
      action_space: [long_one_asset, cash]
      base_cost_bps: 10
      changed_fields_from_v64:
        - abstention_probability_threshold
        - probability_event
        - probability_computation
        - entry_rule
        - hold_rule
        - switch_rule
        - exit_rule
      reporting_cost_bps: [10, 20, 30]
      desired_asset: highest_context_and_seed_averaged_raw_excess
      momentum_cash_gate: all_currently_eligible_momentum_30_nonpositive
      probability_computation: one_minus_equal_weight_student_t_mixture_cdf_at_exact_transition_cost
      probability_event: selected_asset_next_return_strictly_above_exact_transition_cost
      entry_rule: enter_desired_asset_only_when_momentum_gate_open_and_probability_event_at_least_0_60
      hold_rule: retain_eligible_incumbent_only_when_probability_event_at_least_0_60
      switch_rule: switch_only_when_challenger_minus_incumbent_raw_excess_strictly_above_0_002_and_challenger_probability_event_at_least_0_60
      exit_rule: cash_when_momentum_gate_closes_or_incumbent_probability_event_below_0_60
      switch_hurdle: 0.002
      risky_gross: 1.0
      leverage: false
      shorting: false
      final_liquidation: true
      threshold_source: preregistered_fixed_supermajority_not_selected_from_v64
      threshold_sweep_allowed: false
    accounting:
