seed: 20260713

data:
  source: binance
  interval: 1d
  start: "2018-01-01"
  end: null
  cache_dir: data/raw
  assets:
    BTC: BTCUSDT
    ETH: ETHUSDT
    SOL: SOLUSDT

target:
  mode: next_open_to_open

intraday_path:
  source: binance_metrics_archive
  source_manifest: artifacts/v10_derivatives_data/manifest.json
  start: "2021-12-01"
  end: "2026-06-30"
  symbols:
    BTC: BTCUSDT
    ETH: ETHUSDT
    SOL: SOLUSDT
  minimum_intraday_samples: 250
  # Same complete-case coverage gate used by the registered signal study.
  minimum_feature_coverage: 0.90

derivatives_signal_study:
  study_title: TLM v12 Intraday Derivatives Path Signal Existence Study
  method: complete_case_train_oriented_intraday_path_downside_study
  positive_conclusion: candidate_intraday_path_signals_exist_research_only
  negative_conclusion: no_stable_intraday_path_downside_signal
  positive_decision: At least one intraday path signal survived. It may justify one separately pre-registered policy experiment, but does not authorize promotion or live trading.
  negative_decision: No intraday path signal survived. Close this derivatives-path branch; do not tune v12 bins or gates and do not design a policy from these variables. The next research branch must add a genuinely independent timestamped family or wait for a clean future holdout.
  derivatives_artifact_dir: artifacts/v12_intraday_path_signal_existence/path_data
  start: "2021-12-01"
  end: "2026-06-30"
  momentum_lookback: 30
  purge_samples: 1
  quantile_bins: 5
  tail_quantile: 0.10
  signals:
    - control__taker_ratio_last
    - control__taker_ratio_log_change
    - control__taker_ratio_slope
    - control__taker_ratio_autocorr_1
    - control__taker_buy_fraction
    - control__taker_ratio_last_hour_mean
    - control__taker_ratio_reversal_1h
    - control__oi_log_change_intraday
    - control__oi_range_intraday
    - control__oi_max_drawdown_intraday
    - control__oi_slope_intraday
    - control__oi_last_hour_log_change
    - control__oi_value_log_change_intraday
    - market_mean__taker_ratio_slope
    - market_mean__taker_ratio_reversal_1h
    - market_mean__oi_slope_intraday
    - cross_dispersion__taker_ratio_slope
    - cross_dispersion__oi_range_intraday
  minimum_observed_coverage: 0.90
  minimum_test_rho: 0.50
  minimum_orientation_consistency: 0.66
  minimum_monotonic_fold_fraction: 0.50
  minimum_risk_coverage: 0.12
  maximum_risk_coverage: 0.28
  minimum_downside_lift: 1.25
  minimum_tail_lift: 1.25
  minimum_bootstrap_probability: 0.70

validation_suite:
  monte_carlo:
    method: paired_circular_block_bootstrap_risk_lift
    paths: 3000
    block_lengths: [7, 21, 63]
    seed: 20260713
    batch_size: 250
  scenarios:
    - name: reference_expanding_3
      validation:
        mode: expanding
        folds: 3
        min_train_fraction: 0.50
    - name: expanding_6
      validation:
        mode: expanding
        folds: 6
        min_train_fraction: 0.40
    - name: rolling_6_730d
      validation:
        mode: rolling
        folds: 6
        # 730 / 1673 = 43.63%; 44% preserves the frozen 730-day window.
        min_train_fraction: 0.44
        train_window_samples: 730

output_dir: artifacts/v12_intraday_path_signal_existence
