treasury:
  source: us_treasury_daily_par_yield_curve
  csv_url_template: https://home.treasury.gov/resource-center/data-chart-center/interest-rates/daily-treasury-rates.csv/{year}/all?type=daily_treasury_yield_curve&field_tdr_date_value={year}&_format=csv
  start: "2021-12-06"
  end: "2026-06-30"
  timeout_seconds: 30
  raw_dir: data/raw/us_treasury_curve
  source_columns: [2 Yr, 10 Yr]
  minimum_weekday_coverage: 0.95
  execution_lag_calendar_days: 3
  maximum_carry_days: 7
  rolling_window: 20
  feature_columns:
    - market__treasury_2y
    - market__treasury_10y
    - market__treasury_curve_10y_2y
    - market__treasury_2y_change
    - market__treasury_10y_change
    - market__treasury_curve_change
    - market__treasury_curve_z20
    - market__treasury_10y_z20
    - market__treasury_2y_change_vol20
    - market__treasury_10y_change_vol20

output_dir: artifacts/v18_treasury_curve_data
