    spearman: average_tie_ranks_predicted_raw_excess_vs_action_log_return
    pairwise_accuracy: all_three_pairs_actual_ties_at_or_below_1e_12_excluded_prediction_ties_incorrect
    top1_tie_break: lexical_first
    top1_hit: selected_return_within_1e_12_of_triplet_maximum
