    absolute_gate: cash_only_when_all_currently_eligible_momentum_30_are_nonpositive
    momentum_30: rolling_sum_log_close_to_close_return_window_30_min_periods_30_including_signal_date
    switch_rule: challenger_minus_incumbent_raw_excess_strictly_above_0_002
    switch_hurdle: 0.002
    switch_hurdle_cost_scenario_specific: false
    entry_from_cash_requires_hurdle: false
    ineligible_incumbent: exit_immediately_then_enter_lexical_top_score_if_absolute_gate_is_open
    score_tie_break: lexical_first
    maximum_gross_exposure: 1.0
    shorting: false
    leverage: false
    controls:
      - dual_momentum_30
      - momentum_gated_equal_weight
    implementations:
      candidate: tlm.ranking_excess_harness.ranking_excess_positions
      dual_momentum_30: tlm.ranking_excess_harness.eligible_dual_momentum_positions
      momentum_gated_equal_weight: tlm.ranking_excess_harness.momentum_gated_equal_weight_positions
    control_rules:
      dual_momentum_30: hold_lexical_highest_momentum_eligible_asset_only_when_its_momentum_is_strictly_positive
      momentum_gated_equal_weight: when_any_eligible_momentum_is_strictly_positive_hold_every_eligible_asset_at_equal_weight_otherwise_cash

  accounting:
    reporting_cost_bps: [10, 20, 30]
    base_cost_bps: 10
    cost_per_unit_turnover: bps_divided_by_10000
    gross_return: sum_weight_times_expm1_action_log_return
    turnover: l1_weight_change_with_entry_switch_exit_and_final_liquidation
    aggregate: equal_one_third_capital_per_fold_daily_mean
    annualization_days: 365
    sharpe_standard_deviation_ddof: 1
    zero_volatility_sharpe: 0.0

  bootstrap:
    method: circular_block
    paths: 10000
    block_lengths_days: [7, 21, 63]
    base_seed: 20260713
    batch_size: 250
    aggregate_triplet_contexts_before_resampling: true
    top1_series: equal_context_mean_within_fold_date_then_equal_fold_mean_by_date
    top1_statistic: arithmetic_mean_action_log_excess
    economic_cost_bps: 10
    economic_series: equal_fold_daily_net_simple_returns
    economic_statistic: paired_compounded_total_return_delta
    seed_rule: base_seed_plus_1000_for_top1_plus_block_or_base_seed_plus_block_for_economic

  gates:
    mean_spearman_strictly_positive_each_fold: true
    mean_top1_excess_strictly_positive_each_fold: true
    aggregate_pairwise_accuracy_strictly_above: 0.50
    transformer_beats_ridge_on_aggregate_spearman_and_top1_excess: true
    top1_excess_bootstrap_p05_strictly_positive_all_blocks: true
    positive_net_return_each_fold_at_base_cost: true
    aggregate_return_above_both_policy_controls_all_costs: true
    aggregate_sharpe_above_dual_momentum_all_costs: true
    maximum_absolute_drawdown: 0.35
    maximum_drawdown_tolerance_vs_dual_momentum: 0.05
    drawdown_gates_apply_all_costs: true
    turnover_not_above_dual_momentum_at_base_cost: true
    paired_return_delta_p05_above_zero_all_controls_and_blocks: true
    all_cells_required: true
    exact_operators:
